<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: monospace;
    color: #FF69B4; /* pink text */
  }
  h1 {
    margin-bottom: 40px;
    text-align: center;
  }
  .button {
    display: block;
    margin: 10px;
    padding: 15px 30px;
    background: black;
    border: 2px solid #FF69B4; /* pink border */
    color: #FF69B4; /* pink text */
    text-decoration: none;
    font-size: 18px;
    transition: 0.2s;
  }
  .button:hover {
    background: #FF69B4; /* pink hover background */
    color: black; /* text turns black on hover */
  }
</style>
</head>
<body>
<h1>Open My Links</h1>
<a class="button" href="https://steamcommunity.com/id/cheezyyer" target="_blank">Steam</a>
<a class="button" href="https://instagram.com/cheezyyer" target="_blank">Instagram</a>
<a class="button" href="https://t.me/cheezyyer" target="_blank">Telegram</a>
</body>
</html>
